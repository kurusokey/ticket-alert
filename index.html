<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0f">
    <title>Ticket Alert</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎫</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100dvh;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 1rem;
        }

        /* ── Header ── */
        header {
            text-align: center;
            padding: 1.2rem 0 1rem;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
        }

        header h1 span { color: #f97316; }

        header p {
            color: #666;
            font-size: 0.8rem;
            margin-top: 0.2rem;
        }

        /* ── Monitor Panel (hero) ── */
        .monitor-panel {
            background: #111118;
            border: 1px solid #1e1e2e;
            border-radius: 16px;
            padding: 1.2rem;
            margin-bottom: 1.2rem;
        }

        .monitor-panel.active {
            border-color: #22c55e44;
            box-shadow: 0 0 30px #22c55e0a;
        }

        .monitor-panel.has-alert {
            border-color: #f9731666;
            box-shadow: 0 0 30px #f973160f;
        }

        .monitor-status-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #333;
            flex-shrink: 0;
        }

        .status-dot.running {
            background: #22c55e;
            animation: pulse 2s infinite;
        }

        .status-dot.alert {
            background: #f97316;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .monitor-status-text {
            font-size: 0.85rem;
            color: #999;
            flex: 1;
        }

        .monitor-status-text strong {
            color: #fff;
            font-weight: 600;
        }

        .telegram-badge {
            font-size: 0.7rem;
            color: #0ea5e9;
            background: #0ea5e911;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            white-space: nowrap;
        }

        /* Big CTA button */
        .btn-cta {
            display: block;
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .btn-cta.start {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #000;
        }

        .btn-cta.start:active { transform: scale(0.98); }

        .btn-cta.stop {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: #fff;
        }

        .btn-cta.stop:active { transform: scale(0.98); }

        .monitor-stats {
            display: flex;
            justify-content: space-around;
            margin-top: 0.8rem;
            padding-top: 0.8rem;
            border-top: 1px solid #1a1a2a;
            font-size: 0.78rem;
        }

        .monitor-stat { text-align: center; }
        .monitor-stat .val { color: #fff; font-weight: 600; font-size: 1rem; }
        .monitor-stat .lbl { color: #555; margin-top: 0.1rem; }

        /* Alerts */
        .alert-item {
            background: #1a0f00;
            border: 1px solid #f9731644;
            border-radius: 10px;
            padding: 0.8rem;
            margin-top: 0.6rem;
            font-size: 0.85rem;
        }

        .alert-item .alert-text { color: #f97316; font-weight: 600; }
        .alert-item a { color: #fb923c; display: inline-block; margin-top: 0.3rem; word-break: break-all; }

        /* Logs */
        .log-container {
            background: #08080d;
            border: 1px solid #141420;
            border-radius: 10px;
            max-height: 150px;
            overflow-y: auto;
            margin-top: 0.6rem;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.72rem;
            line-height: 1.7;
            -webkit-overflow-scrolling: touch;
        }

        .log-container:empty { display: none; }

        .log-line {
            padding: 0.15rem 0.6rem;
            border-bottom: 1px solid #0e0e18;
        }

        .log-line .log-time { color: #444; }
        .log-line .log-msg { color: #777; }
        .log-line.error .log-msg { color: #ef4444; }
        .log-line.alert .log-msg { color: #f97316; font-weight: 600; }
        .log-line.success .log-msg { color: #22c55e; }

        /* ── Section title ── */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.8rem;
        }

        .section-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-add {
            background: #f97316;
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-add:active { transform: scale(0.96); }

        /* ── Event Cards ── */
        .events-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            margin-bottom: 1.2rem;
        }

        .event-card {
            background: #111118;
            border: 1px solid #1e1e2e;
            border-radius: 12px;
            padding: 1rem;
        }

        .event-card.inactive { opacity: 0.45; }

        .event-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
        }

        .event-name {
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .badge {
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }

        .badge-active { background: #052e16; color: #22c55e; }
        .badge-paused { background: #1c1917; color: #666; }

        .event-info {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem 1rem;
            margin-top: 0.5rem;
            font-size: 0.78rem;
            color: #666;
        }

        .event-info span { white-space: nowrap; }
        .event-info a { color: #f97316; text-decoration: none; }

        .event-actions-row {
            display: flex;
            gap: 0.4rem;
            margin-top: 0.6rem;
        }

        .event-actions-row button {
            flex: 1;
            background: #0a0a0f;
            border: 1px solid #222;
            color: #888;
            border-radius: 8px;
            padding: 0.5rem;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.15s;
        }

        .event-actions-row button:active { background: #1a1a2a; color: #fff; }
        .event-actions-row .btn-del:active { color: #ef4444; border-color: #ef4444; }

        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            color: #444;
            font-size: 0.9rem;
        }

        /* ── Form (modal overlay on mobile) ── */
        .form-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 50;
            background: #0a0a0fee;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .form-overlay.open { display: block; }

        .form-inner {
            max-width: 500px;
            margin: 0 auto;
            padding: 1.5rem 1rem 3rem;
        }

        .form-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.2rem;
        }

        .form-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
        }

        .btn-close {
            background: none;
            border: 1px solid #333;
            color: #888;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-close:active { background: #222; }

        .form-stack {
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .form-group label {
            font-size: 0.78rem;
            color: #777;
            font-weight: 500;
        }

        .form-group input {
            background: #111118;
            border: 1px solid #2a2a3a;
            border-radius: 10px;
            padding: 0.75rem 0.9rem;
            color: #e0e0e0;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }

        .form-group input:focus { border-color: #f97316; }
        .form-group input::placeholder { color: #3a3a4a; }
        .form-group .hint { font-size: 0.7rem; color: #444; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.9rem;
        }

        .btn-submit {
            display: block;
            width: 100%;
            margin-top: 0.5rem;
            padding: 1rem;
            background: #f97316;
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-submit:active { transform: scale(0.98); }

        /* ── Scheduler ── */
        .scheduler {
            margin-top: 0.8rem;
            padding: 0.7rem;
            background: #0d0d14;
            border: 1px solid #1a1a2a;
            border-radius: 10px;
        }

        .scheduler.scheduled {
            border-color: #f9731644;
            background: #12100a;
        }

        .sched-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .sched-icon { font-size: 1rem; }

        .sched-label {
            font-size: 0.8rem;
            color: #888;
            flex-shrink: 0;
        }

        .sched-input {
            flex: 1;
            min-width: 0;
            background: #111118;
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            padding: 0.45rem 0.5rem;
            color: #e0e0e0;
            font-size: 0.82rem;
            outline: none;
            -webkit-appearance: none;
        }

        .sched-input:focus { border-color: #f97316; }

        .sched-btn {
            background: #f97316;
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 0.45rem 0.8rem;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .sched-btn.active {
            background: #ef4444;
            color: #fff;
        }

        .sched-btn:active { transform: scale(0.96); }

        .sched-countdown {
            margin-top: 0.5rem;
            text-align: center;
            font-size: 1.3rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            color: #f97316;
            letter-spacing: 1px;
        }

        .sched-countdown .sched-sub {
            font-size: 0.75rem;
            font-weight: 400;
            color: #666;
            margin-top: 0.1rem;
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 0.7rem 1.2rem;
            font-size: 0.85rem;
            color: #22c55e;
            opacity: 0;
            transition: all 0.3s;
            z-index: 100;
            white-space: nowrap;
            max-width: 90vw;
            text-align: center;
        }

        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.error { color: #ef4444; }

        /* ── Desktop tweaks ── */
        @media (min-width: 640px) {
            .container { padding: 2rem 1.5rem; }
            header h1 { font-size: 1.8rem; }
            .btn-cta { max-width: 300px; margin: 0 auto; }
            .event-card { padding: 1.2rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Ticket <span>Alert</span></h1>
            <p>Surveillance billetterie + Telegram</p>
        </header>

        <!-- ── Monitor ── -->
        <div class="monitor-panel" id="monitorPanel">
            <div class="monitor-status-row">
                <div class="status-dot" id="monitorDot"></div>
                <div class="monitor-status-text" id="monitorTitle"><strong>Surveillance inactive</strong></div>
                <span class="telegram-badge">Telegram</span>
            </div>

            <button class="btn-cta start" id="btnStart" onclick="startMonitor()">Lancer la surveillance</button>
            <button class="btn-cta stop" id="btnStop" onclick="stopMonitor()" style="display:none">Arreter la surveillance</button>

            <!-- Scheduler -->
            <div class="scheduler" id="scheduler">
                <div class="sched-row">
                    <span class="sched-icon">⏰</span>
                    <span class="sched-label">Demarrage auto</span>
                    <input type="datetime-local" id="schedTime" class="sched-input">
                    <button class="sched-btn" id="schedBtn" onclick="toggleSchedule()">Programmer</button>
                </div>
                <div class="sched-countdown" id="schedCountdown" style="display:none"></div>
            </div>

            <div class="monitor-stats" id="monitorStats" style="display:none">
                <div class="monitor-stat">
                    <div class="val" id="statChecks">0</div>
                    <div class="lbl">Checks</div>
                </div>
                <div class="monitor-stat">
                    <div class="val" id="statStarted">--:--</div>
                    <div class="lbl">Demarre</div>
                </div>
                <div class="monitor-stat">
                    <div class="val">10s</div>
                    <div class="lbl">Intervalle</div>
                </div>
            </div>

            <div id="monitorAlerts"></div>
            <div class="log-container" id="logContainer"></div>
        </div>

        <!-- ── Events ── -->
        <div class="section-header">
            <span class="section-title">Evenements</span>
            <button class="btn-add" onclick="openForm()">+ Ajouter</button>
        </div>
        <div class="events-list" id="eventsList"></div>
    </div>

    <!-- ── Form overlay ── -->
    <div class="form-overlay" id="formOverlay">
        <div class="form-inner">
            <div class="form-header">
                <h2 id="formTitle">Ajouter un evenement</h2>
                <button class="btn-close" onclick="closeForm()">&times;</button>
            </div>
            <div class="form-stack">
                <div class="form-group">
                    <label>Nom</label>
                    <input type="text" id="eventName" placeholder="Ex: Joe Dwet File">
                </div>
                <div class="form-group">
                    <label>Lieu</label>
                    <input type="text" id="eventVenue" placeholder="Ex: Paris La Defense Arena">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Date concert</label>
                        <input type="date" id="eventDate">
                    </div>
                    <div class="form-group">
                        <label>Ouverture vente</label>
                        <input type="datetime-local" id="eventSaleDate">
                    </div>
                </div>
                <div class="form-group">
                    <label>URL de la page</label>
                    <input type="url" id="eventUrl" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>Texte de fermeture</label>
                    <input type="text" id="eventMarker" placeholder="Ex: ouverture imminente">
                    <span class="hint">Texte visible sur la page quand la vente n'est pas ouverte</span>
                </div>
                <button class="btn-submit" id="btnSave" onclick="saveEvent()">Ajouter</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API = '';
        let events = [];
        let editingId = null;
        let pollInterval = null;

        // ══════════════════════════════════════
        // MONITOR
        // ══════════════════════════════════════

        async function startMonitor() {
            try {
                const res = await fetch(`${API}/api/monitor/start`, { method: 'POST' });
                const data = await res.json();
                if (data.ok) {
                    showToast('Surveillance lancee');
                    startPolling();
                } else {
                    showToast(data.message || 'Deja en cours', true);
                }
            } catch (e) {
                showToast('Erreur serveur', true);
            }
        }

        async function stopMonitor() {
            try {
                const res = await fetch(`${API}/api/monitor/stop`, { method: 'POST' });
                const data = await res.json();
                if (data.ok) {
                    showToast('Surveillance arretee');
                    stopPolling();
                    updateMonitorUI({ running: false, check_count: 0, logs: [], alerts: [] });
                }
            } catch (e) {
                showToast('Erreur', true);
            }
        }

        async function pollMonitorStatus() {
            try {
                const res = await fetch(`${API}/api/monitor/check`);
                const data = await res.json();
                if (data.status) {
                    updateMonitorUI(data.status);
                    if (!data.status.running && pollInterval) stopPolling();
                } else if (data.skipped) {
                    const r2 = await fetch(`${API}/api/monitor/status`);
                    const d2 = await r2.json();
                    updateMonitorUI(d2);
                    if (!d2.running) stopPolling();
                }
            } catch (e) {
                try {
                    const res = await fetch(`${API}/api/monitor/status`);
                    updateMonitorUI(await res.json());
                } catch {}
            }
        }

        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(pollMonitorStatus, 10000);
            pollMonitorStatus();
        }

        function stopPolling() {
            if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
        }

        function updateMonitorUI(data) {
            const panel = document.getElementById('monitorPanel');
            const dot = document.getElementById('monitorDot');
            const title = document.getElementById('monitorTitle');
            const btnStart = document.getElementById('btnStart');
            const btnStop = document.getElementById('btnStop');
            const stats = document.getElementById('monitorStats');

            if (data.running) {
                const hasAlert = data.alerts?.length > 0;
                panel.className = 'monitor-panel' + (hasAlert ? ' has-alert' : ' active');
                dot.className = 'status-dot' + (hasAlert ? ' alert' : ' running');
                title.innerHTML = hasAlert
                    ? '<strong style="color:#f97316">BILLETTERIE OUVERTE !</strong>'
                    : '<strong>Surveillance active</strong> &mdash; check toutes les 10s';
                btnStart.style.display = 'none';
                btnStop.style.display = '';
                stats.style.display = '';
                document.getElementById('scheduler').style.display = 'none';
                document.getElementById('statChecks').textContent = data.check_count || 0;
                document.getElementById('statStarted').textContent = data.started_at || '--:--';
            } else {
                panel.className = 'monitor-panel';
                dot.className = 'status-dot';
                title.innerHTML = '<strong>Surveillance inactive</strong>';
                btnStart.style.display = '';
                btnStop.style.display = 'none';
                stats.style.display = 'none';
                document.getElementById('scheduler').style.display = '';
            }

            // Alerts
            const ac = document.getElementById('monitorAlerts');
            if (data.alerts?.length) {
                ac.innerHTML = data.alerts.map(a => `
                    <div class="alert-item">
                        <div class="alert-text">🚨 ${esc(a.event)} — BILLETTERIE OUVERTE</div>
                        ${a.url ? `<a href="${esc(a.url)}" target="_blank">Ouvrir le site</a>` : ''}
                    </div>
                `).join('');
            } else {
                ac.innerHTML = '';
            }

            // Logs
            const lc = document.getElementById('logContainer');
            if (data.logs?.length) {
                const atBottom = lc.scrollTop + lc.clientHeight >= lc.scrollHeight - 20;
                lc.innerHTML = data.logs.map(l => `
                    <div class="log-line ${l.level || ''}">
                        <span class="log-time">${l.time}</span>
                        <span class="log-msg"> ${esc(l.message)}</span>
                    </div>
                `).join('');
                if (atBottom) lc.scrollTop = lc.scrollHeight;
            } else if (!data.running) {
                lc.innerHTML = '';
            }
        }

        // ══════════════════════════════════════
        // STORAGE
        // ══════════════════════════════════════

        const LS_KEY = 'ticket_alert_events';

        function lsGetEvents() {
            try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; }
            catch { return []; }
        }

        function lsSaveEvents(data) {
            localStorage.setItem(LS_KEY, JSON.stringify(data));
        }

        async function apiCall(path, opts = {}) {
            try {
                const res = await fetch(`${API}${path}`, opts);
                if (res.ok) return await res.json();
            } catch {}
            return null;
        }

        // ══════════════════════════════════════
        // EVENTS
        // ══════════════════════════════════════

        async function loadEvents() {
            const data = await apiCall('/api/events');
            if (data && Array.isArray(data)) {
                events = data;
                const localEvents = lsGetEvents();
                const apiIds = new Set(events.map(e => e.id));
                for (const le of localEvents) {
                    if (!apiIds.has(le.id)) events.push(le);
                }
            } else {
                events = lsGetEvents();
            }
            lsSaveEvents(events);
            renderEvents();
        }

        function renderEvents() {
            const list = document.getElementById('eventsList');
            if (events.length === 0) {
                list.innerHTML = '<div class="empty-state">Aucun evenement surveille</div>';
                return;
            }

            list.innerHTML = events.map(ev => {
                const bc = ev.active ? 'badge-active' : 'badge-paused';
                const bt = ev.active ? 'Actif' : 'Pause';
                const cc = ev.active ? '' : 'inactive';
                const sd = ev.sale_date ? fmtDate(ev.sale_date) : '';
                const ed = ev.date ? fmtDate(ev.date) : '';
                let host = '';
                try { host = new URL(ev.url).hostname.replace('www.',''); } catch {}

                return `
                    <div class="event-card ${cc}">
                        <div class="event-top">
                            <span class="event-name">${esc(ev.name)}</span>
                            <span class="badge ${bc}">${bt}</span>
                        </div>
                        <div class="event-info">
                            ${ev.venue ? `<span>${esc(ev.venue)}</span>` : ''}
                            ${ed ? `<span>${ed}</span>` : ''}
                            ${sd ? `<span>Vente: ${sd}</span>` : ''}
                            ${host ? `<span><a href="${esc(ev.url)}" target="_blank">${esc(host)}</a></span>` : ''}
                        </div>
                        <div class="event-actions-row">
                            <button onclick="toggleEvent('${ev.id}')">${ev.active ? 'Pause' : 'Activer'}</button>
                            <button onclick="editEvent('${ev.id}')">Modifier</button>
                            <button class="btn-del" onclick="deleteEvent('${ev.id}')">Supprimer</button>
                        </div>
                    </div>`;
            }).join('');
        }

        // ══════════════════════════════════════
        // FORM
        // ══════════════════════════════════════

        function openForm() {
            editingId = null;
            clearFormFields();
            document.getElementById('formTitle').textContent = 'Ajouter un evenement';
            document.getElementById('btnSave').textContent = 'Ajouter';
            document.getElementById('formOverlay').classList.add('open');
        }

        function closeForm() {
            document.getElementById('formOverlay').classList.remove('open');
            editingId = null;
        }

        function editEvent(id) {
            const ev = events.find(e => e.id === id);
            if (!ev) return;
            editingId = id;
            document.getElementById('eventName').value = ev.name || '';
            document.getElementById('eventVenue').value = ev.venue || '';
            document.getElementById('eventDate').value = ev.date || '';
            document.getElementById('eventSaleDate').value = (ev.sale_date || '').replace(' ', 'T');
            document.getElementById('eventUrl').value = ev.url || '';
            document.getElementById('eventMarker').value = ev.closed_marker || '';
            document.getElementById('formTitle').textContent = 'Modifier';
            document.getElementById('btnSave').textContent = 'Enregistrer';
            document.getElementById('formOverlay').classList.add('open');
        }

        async function saveEvent() {
            const name = document.getElementById('eventName').value.trim();
            const url = document.getElementById('eventUrl').value.trim();
            if (!name || !url) { showToast('Nom et URL requis', true); return; }

            const ev = {
                id: editingId || slugify(name) + '-' + Date.now().toString(36),
                name,
                venue: document.getElementById('eventVenue').value.trim(),
                date: document.getElementById('eventDate').value || null,
                sale_date: document.getElementById('eventSaleDate').value ? document.getElementById('eventSaleDate').value.replace('T', ' ') : null,
                url,
                closed_marker: document.getElementById('eventMarker').value.trim() || null,
                active: true,
            };

            const stored = lsGetEvents();
            if (editingId) {
                const idx = stored.findIndex(e => e.id === editingId);
                if (idx >= 0) stored[idx] = ev; else stored.push(ev);
            } else {
                stored.push(ev);
            }
            lsSaveEvents(stored);

            const endpoint = editingId ? '/api/events/update' : '/api/events/create';
            apiCall(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(ev),
            });

            showToast(editingId ? 'Modifie' : 'Ajoute');
            closeForm();
            loadEvents();
        }

        async function toggleEvent(id) {
            const stored = lsGetEvents();
            for (const ev of stored) { if (ev.id === id) ev.active = !ev.active; }
            lsSaveEvents(stored);
            apiCall('/api/events/toggle', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id }),
            });
            showToast('Mis a jour');
            loadEvents();
        }

        async function deleteEvent(id) {
            if (!confirm('Supprimer ?')) return;
            lsSaveEvents(lsGetEvents().filter(e => e.id !== id));
            apiCall('/api/events/remove', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id }),
            });
            showToast('Supprime');
            loadEvents();
        }

        function clearFormFields() {
            ['eventName','eventVenue','eventDate','eventSaleDate','eventUrl','eventMarker']
                .forEach(id => document.getElementById(id).value = '');
        }

        // ══════════════════════════════════════
        // HELPERS
        // ══════════════════════════════════════

        function slugify(t) {
            return t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
                .replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
        }

        function esc(s) {
            if (!s) return '';
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function fmtDate(s) {
            if (!s) return '';
            try {
                return new Date(s.replace(' ','T')).toLocaleDateString('fr-FR', {
                    day: 'numeric', month: 'short', year: 'numeric',
                    hour: s.includes(':') ? '2-digit' : undefined,
                    minute: s.includes(':') ? '2-digit' : undefined,
                });
            } catch { return s; }
        }

        function showToast(msg, error = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show' + (error ? ' error' : '');
            setTimeout(() => t.className = 'toast', 2000);
        }

        // ══════════════════════════════════════
        // SCHEDULER
        // ══════════════════════════════════════

        let schedTimer = null;
        let schedTarget = null;
        const SCHED_KEY = 'ticket_alert_schedule';

        function toggleSchedule() {
            if (schedTarget) {
                cancelSchedule();
            } else {
                const input = document.getElementById('schedTime').value;
                if (!input) { showToast('Choisis une date/heure', true); return; }
                const target = new Date(input);
                if (target <= new Date()) { showToast('L\'heure doit etre dans le futur', true); return; }
                schedTarget = target;
                localStorage.setItem(SCHED_KEY, target.toISOString());
                startCountdown();
                showToast('Demarrage programme');
            }
        }

        function cancelSchedule() {
            schedTarget = null;
            localStorage.removeItem(SCHED_KEY);
            if (schedTimer) { clearInterval(schedTimer); schedTimer = null; }
            document.getElementById('scheduler').classList.remove('scheduled');
            document.getElementById('schedCountdown').style.display = 'none';
            document.getElementById('schedBtn').textContent = 'Programmer';
            document.getElementById('schedBtn').classList.remove('active');
            document.getElementById('schedTime').disabled = false;
        }

        function startCountdown() {
            const sched = document.getElementById('scheduler');
            const btn = document.getElementById('schedBtn');
            const cd = document.getElementById('schedCountdown');
            const input = document.getElementById('schedTime');

            sched.classList.add('scheduled');
            btn.textContent = 'Annuler';
            btn.classList.add('active');
            input.disabled = true;
            cd.style.display = 'block';

            if (schedTimer) clearInterval(schedTimer);
            schedTimer = setInterval(() => {
                const now = new Date();
                const diff = schedTarget - now;

                if (diff <= 0) {
                    // Time's up — start monitoring!
                    cancelSchedule();
                    startMonitor();
                    showToast('Surveillance demarree automatiquement');
                    return;
                }

                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);

                cd.innerHTML = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
                    + `<div class="sched-sub">avant demarrage auto</div>`;
            }, 1000);
        }

        // Restore schedule from localStorage on page load
        function restoreSchedule() {
            const saved = localStorage.getItem(SCHED_KEY);
            if (saved) {
                const target = new Date(saved);
                if (target > new Date()) {
                    schedTarget = target;
                    document.getElementById('schedTime').value = target.toISOString().slice(0, 16);
                    startCountdown();
                } else {
                    // Time already passed while page was closed — start now!
                    localStorage.removeItem(SCHED_KEY);
                    startMonitor();
                    showToast('Heure programmee atteinte — surveillance lancee');
                }
            } else {
                // Pre-fill with tomorrow 18:00 as default
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                tomorrow.setHours(18, 0, 0, 0);
                document.getElementById('schedTime').value = tomorrow.toISOString().slice(0, 16);
            }
        }

        // ══════════════════════════════════════
        // INIT
        // ══════════════════════════════════════

        loadEvents();
        restoreSchedule();

        (async () => {
            try {
                const res = await fetch(`${API}/api/monitor/status`);
                const data = await res.json();
                updateMonitorUI(data);
                if (data.running) startPolling();
            } catch {}
        })();
    </script>
</body>
</html>
